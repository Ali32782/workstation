<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Anmeldung — Kineo360 Sign</title>
  <link rel="icon" href="/favicon.ico" />
  <style>
    :root { color-scheme: light dark; }
    html, body { height: 100%; margin: 0; }
    body {
      display: flex; align-items: center; justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      background: #fafafa;
      color: #111;
    }
    @media (prefers-color-scheme: dark) {
      body { background: #0a0a0a; color: #f5f5f5; }
      .card { background: #1a1a1a; border-color: #2a2a2a; }
      .err  { color: #fca5a5; }
      a     { color: #93c5fd; }
    }
    .card {
      background: #fff;
      border: 1px solid #e5e5e5;
      border-radius: 12px;
      padding: 28px 32px;
      max-width: 360px;
      width: 90%;
      text-align: center;
      box-shadow: 0 1px 3px rgba(0,0,0,.04), 0 8px 24px rgba(0,0,0,.06);
    }
    .spinner {
      width: 28px; height: 28px;
      border: 3px solid currentColor;
      border-right-color: transparent;
      border-radius: 50%;
      animation: spin .8s linear infinite;
      margin: 0 auto 14px;
      opacity: .55;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    h1 { font-size: 16px; font-weight: 600; margin: 0 0 4px; }
    p  { font-size: 13px; opacity: .7; margin: 4px 0 0; }
    .err { display: none; }
    .err.show { display: block; color: #b91c1c; margin-top: 14px; }
    a.btn {
      display: inline-block;
      margin-top: 12px;
      padding: 8px 14px;
      background: #1e4d8c;
      color: #fff;
      border-radius: 6px;
      text-decoration: none;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="spinner" aria-hidden="true"></div>
    <h1>Anmeldung läuft …</h1>
    <p>Du wirst zum SSO weitergeleitet.</p>
    <div class="err" id="err">
      <p><strong>Auto-Login fehlgeschlagen.</strong></p>
      <a class="btn" href="/signin">Manuell anmelden</a>
    </div>
  </div>
  <script>
    (async () => {
      try {
        const res = await fetch("/api/auth/oauth/authorize/oidc", {
          method: "POST",
          credentials: "include",
          headers: { "Content-Type": "application/json" },
          body: "{}",
        });
        if (!res.ok) throw new Error("HTTP " + res.status);
        const data = await res.json();
        if (!data || !data.redirectUrl) throw new Error("no redirectUrl");
        window.location.replace(data.redirectUrl);
      } catch (err) {
        console.error("[sso-bridge]", err);
        document.getElementById("err").classList.add("show");
      }
    })();
  </script>
</body>
</html>
