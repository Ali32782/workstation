# =============================================================================
# Monitoring overlay — Uptime Kuma.
# Added in Phase 2. Reachable at status.medtheris.kineo360.work.
#
# Start:  docker compose -f docker-compose.monitoring.yml --env-file .env up -d
# =============================================================================

name: monitoring

networks:
  proxy:
    external: true

volumes:
  uptime_kuma_data:

services:
  uptime-kuma:
    image: louislam/uptime-kuma:1
    container_name: uptime-kuma
    restart: unless-stopped
    environment:
      TZ: ${TZ}
    volumes:
      - uptime_kuma_data:/app/data
    networks:
      - proxy
    healthcheck:
      test: ["CMD", "node", "extra/healthcheck.js"]
      interval: 60s
      timeout: 10s
      retries: 3
