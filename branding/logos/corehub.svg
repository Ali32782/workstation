<svg width="600" height="200" viewBox="0 0 600 200" xmlns="http://www.w3.org/2000/svg">
  <rect width="600" height="200" fill="white"/>

  <!-- Icon mark -->
  <g transform="translate(100, 100)">
    <!-- Outer hex ring -->
    <path d="M0,-62 L53.7,-31 L53.7,31 L0,62 L-53.7,31 L-53.7,-31 Z" fill="none" stroke="#1e4d8c" stroke-width="5" stroke-linejoin="round"/>
    <!-- Inner hexagon filled -->
    <path d="M0,-40 L34.6,-20 L34.6,20 L0,40 L-34.6,20 L-34.6,-20 Z" fill="#1e4d8c"/>
    <!-- Core white hexagon -->
    <path d="M0,-22 L19,-11 L19,11 L0,22 L-19,11 L-19,-11 Z" fill="#ffffff"/>
    <!-- Spokes -->
    <line x1="0" y1="-40" x2="0" y2="-62" stroke="#4a7fc1" stroke-width="3" stroke-linecap="round"/>
    <line x1="34.6" y1="-20" x2="53.7" y2="-31" stroke="#4a7fc1" stroke-width="3" stroke-linecap="round"/>
    <line x1="34.6" y1="20" x2="53.7" y2="31" stroke="#4a7fc1" stroke-width="3" stroke-linecap="round"/>
    <line x1="0" y1="40" x2="0" y2="62" stroke="#4a7fc1" stroke-width="3" stroke-linecap="round"/>
    <line x1="-34.6" y1="20" x2="-53.7" y2="31" stroke="#4a7fc1" stroke-width="3" stroke-linecap="round"/>
    <line x1="-34.6" y1="-20" x2="-53.7" y2="-31" stroke="#4a7fc1" stroke-width="3" stroke-linecap="round"/>
    <!-- Vertex dots -->
    <circle cx="0" cy="-62" r="5" fill="#4a7fc1"/>
    <circle cx="53.7" cy="-31" r="5" fill="#4a7fc1"/>
    <circle cx="53.7" cy="31" r="5" fill="#4a7fc1"/>
    <circle cx="0" cy="62" r="5" fill="#4a7fc1"/>
    <circle cx="-53.7" cy="31" r="5" fill="#4a7fc1"/>
    <circle cx="-53.7" cy="-31" r="5" fill="#4a7fc1"/>
    <!-- Center dot -->
    <circle cx="0" cy="0" r="6" fill="#1e4d8c"/>
  </g>

  <!-- Divider -->
  <line x1="175" y1="52" x2="175" y2="148" stroke="#d0dae6" stroke-width="1.5"/>

  <!-- Wordmark -->
  <text x="195" y="108" font-family="Helvetica Neue, Arial, sans-serif" font-size="38" font-weight="600" fill="#1a2f4e" letter-spacing="-0.5">Corehub</text>
  <text x="196" y="136" font-family="Helvetica Neue, Arial, sans-serif" font-size="12" font-weight="400" fill="#7a8fa6" letter-spacing="3.5">TECHNOLOGIES LLC</text>
</svg>
