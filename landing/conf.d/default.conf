# Landing nginx - serves three roles:
#   1. kineo360.work / www.kineo360.work -> public marketing
#   2. medtheris.kineo360.work           -> MedTheris operator dashboard (static)
#   3. <slug>.kineo360.work              -> practice tenant dashboard with links
#                                           to files./chat./meet. of that tenant
#
# All requests come in already TLS-terminated at NPM; we only speak HTTP here.

map $host $tenant_slug {
    default                         "";
    "~^(?<s>[^.]+)\.kineo360\.work$" $s;
}

server {
    listen 80 default_server;
    server_name kineo360.work www.kineo360.work;
    root /usr/share/nginx/html/apex;
    index index.html;

    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location = /healthz { return 200 "ok\n"; add_header Content-Type text/plain; }
    location / { try_files $uri $uri/ =404; }
}

# Tenant dashboard (any <slug>.kineo360.work). The same static template is
# reused for every tenant; dynamic substitution of the slug happens client-side.
server {
    listen 80;
    server_name ~^(?<slug>[^.]+)\.kineo360\.work$;
    root /usr/share/nginx/html/tenant;
    index index.html;

    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location = /healthz { return 200 "ok\n"; add_header Content-Type text/plain; }

    # Expose the slug to the page via a dedicated endpoint for JS to read.
    location = /tenant.json {
        default_type application/json;
        return 200 '{"slug":"$slug","domain":"kineo360.work"}';
    }

    location / { try_files $uri $uri/ /index.html; }
}
