<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Kineo360</title>
<style>
  :root { --ink:#0f172a; --muted:#475569; --accent:#2563eb; --bg:#f8fafc;
          --card:#ffffff; --border:#e2e8f0; }
  * { box-sizing: border-box; }
  html, body { margin:0; background:var(--bg); color:var(--ink);
               font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Inter,Helvetica,Arial,sans-serif;
               -webkit-font-smoothing:antialiased; line-height:1.5; }
  .wrap { max-width:720px; margin:0 auto; padding:48px 24px; }
  .brand { font-weight:700; font-size:16px; color:var(--muted); margin-bottom:40px; }
  .brand b { color:var(--accent); }
  h1 { font-size:32px; margin:0 0 8px; letter-spacing:-0.02em; }
  .sub { color:var(--muted); margin-bottom:40px; }
  .tiles { display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:14px; }
  a.tile { display:block; padding:18px; background:var(--card); border:1px solid var(--border);
           border-radius:12px; text-decoration:none; color:var(--ink);
           transition: transform .08s ease, border-color .15s ease; }
  a.tile:hover { transform:translateY(-1px); border-color:var(--accent); }
  a.tile h3 { margin:0 0 6px; font-size:16px; }
  a.tile p  { margin:0; color:var(--muted); font-size:13.5px; }
  footer { margin-top:56px; color:var(--muted); font-size:13px; text-align:center; }
</style>
</head>
<body>
<div class="wrap">
  <div class="brand">Kineo<b>360</b></div>
  <h1 id="tenant-title">Praxis-Zugang</h1>
  <p class="sub" id="tenant-sub">Loading…</p>

  <div class="tiles" id="tiles"></div>

  <footer>
    <a href="https://kineo360.work" style="color:inherit;text-decoration:none;">← kineo360.work</a>
    &nbsp;·&nbsp;
    Support: <a href="https://support.medtheris.kineo360.work" style="color:inherit;">support.medtheris.kineo360.work</a>
  </footer>
</div>
<script>
  (async () => {
    const r = await fetch('/tenant.json').catch(() => null);
    const data = r && r.ok ? await r.json() : { slug: location.hostname.split('.')[0], domain: 'kineo360.work' };
    const { slug, domain } = data;
    const pretty = slug.charAt(0).toUpperCase() + slug.slice(1);

    document.getElementById('tenant-title').textContent = `Willkommen, ${pretty}`;
    document.getElementById('tenant-sub').textContent   = `Dein Arbeitsplatz auf ${slug}.${domain}.`;

    const tiles = [
      { href: `https://files.${slug}.${domain}`, h: 'Dokumente', p: 'Nextcloud — Patientendossiers, Formulare, Dateien.' },
      { href: `https://chat.${slug}.${domain}`,  h: 'Chat',      p: 'Rocket.Chat — Kanäle, Direktnachrichten.' },
      { href: `https://meet.medtheris.${domain}`, h: 'Video',    p: 'Jitsi Meet — sofort starten.' },
      { href: `https://support.medtheris.${domain}`, h: 'Support', p: 'Ticket eröffnen.' },
      { href: `https://auth.${slug}.${domain}/realms/practice-${slug}/account`, h: 'Mein Konto', p: 'Passwort, 2FA, Sessions verwalten.' }
    ];

    const root = document.getElementById('tiles');
    for (const t of tiles) {
      const a = document.createElement('a');
      a.className = 'tile'; a.href = t.href;
      a.innerHTML = `<h3>${t.h}</h3><p>${t.p}</p>`;
      root.appendChild(a);
    }
  })();
</script>
</body>
</html>
