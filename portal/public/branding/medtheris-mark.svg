<svg width="200" height="200" viewBox="-100 -100 200 200" xmlns="http://www.w3.org/2000/svg">
  <title>MedTheris Mark</title>
  <!-- Outer hexagon filled -->
  <polygon points="0,-86 74.5,-43 74.5,43 0,86 -74.5,43 -74.5,-43" fill="#059669"/>
  <!-- Inner hexagon outline -->
  <polygon points="0,-66 57,-33 57,33 0,66 -57,33 -57,-33"
           fill="none" stroke="white" stroke-width="1.4" opacity="0.22"/>
  <!-- Triangle tracers connecting the three nodes -->
  <line x1="-32" y1="-12" x2="0" y2="40" stroke="white" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
  <line x1="32" y1="-12" x2="0" y2="40" stroke="white" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
  <line x1="-32" y1="-12" x2="32" y2="-12" stroke="white" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
  <!-- Node halos -->
  <circle cx="-32" cy="-12" r="9" fill="#6EE7B7"/>
  <circle cx="32" cy="-12" r="9" fill="white"/>
  <circle cx="0" cy="40" r="9" fill="#6EE7B7"/>
  <!-- Node cores -->
  <circle cx="-32" cy="-12" r="4" fill="#059669"/>
  <circle cx="32" cy="-12" r="4" fill="#059669"/>
  <circle cx="0" cy="40" r="4" fill="#059669"/>
</svg>
