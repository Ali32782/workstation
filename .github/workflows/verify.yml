# =============================================================================
# verify.yml — Portal CI gate
#
# Runs the same composite that "npm run verify" runs locally:
#   check:i18n   → portal/scripts/check-i18n.mjs
#   typecheck    → tsc --noEmit
#   lint         → eslint --quiet src
#
# Triggered on every push to main and on every PR that touches the portal/.
# Non-portal changes (docs, scripts, scraper) skip the workflow to keep the
# CI cheap.
# =============================================================================
name: verify

on:
  push:
    branches: [main]
    paths:
      - "portal/**"
      - ".github/workflows/verify.yml"
  pull_request:
    paths:
      - "portal/**"
      - ".github/workflows/verify.yml"

# Cancel obsolete runs when a new commit lands on the same ref.
concurrency:
  group: verify-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: portal/verify
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: portal
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: portal/package-lock.json

      - name: Install dependencies (clean, lockfile-pinned)
        run: npm ci

      - name: i18n guardrail
        run: npm run check:i18n

      - name: Type-check
        run: npm run typecheck

      - name: Lint
        run: npm run lint
